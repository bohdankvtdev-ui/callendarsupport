<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Support</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: linear-gradient(135deg, #ff4fa3, #8a2be2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .glass {
    width: 90%;
    max-width: 520px;
    padding: 28px;
    border-radius: 24px;

    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255, 255, 255, 0.25);

    box-shadow:
      0 20px 60px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }

  h1 {
    margin: 0 0 10px;
    font-size: 26px;
    color: white;
    letter-spacing: 0.5px;
  }

  p {
    color: rgba(255,255,255,0.85);
    margin: 10px 0;
    font-size: 15px;
  }

  .card {
    margin-top: 18px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.2);
  }

  a {
    color: #ffd1f0;
    text-decoration: none;
    font-weight: 500;
  }

  a:hover {
    text-decoration: underline;
  }

  .tag {
    display: inline-block;
    margin-top: 12px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    background: rgba(255,255,255,0.15);
    color: white;
  }
</style>
</head>

<body>

<div class="glass">
  <h1>App Support</h1>

  <p>Help, feedback, or bug reports for your HRT tracking app.</p>

  <div class="card">
    <p>Email:</p>
    <p><a href="mailto:bohdankvtdev@gmail.com">bohdankvtdev@gmail.com</a></p>

    <p>Response time: 24–72 hours</p>
  </div>

 

  <div class="tag">Safe • Private • Trans-friendly support</div>
</div>

</body>
</html>
